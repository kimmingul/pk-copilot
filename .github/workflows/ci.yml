name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR when a new commit lands.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # Lint + format + type-check (fast, runs on a single Python version)
  # ---------------------------------------------------------------------------
  lint:
    name: lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.10.6"
          enable-cache: true
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install project + dev deps
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev,mcp,plot,report,cdisc,compliance]"
          uv pip install pandas-stubs types-openpyxl
      - name: Ruff (lint)
        run: uv run ruff check src/ tests/
      - name: Ruff (format check)
        run: uv run ruff format --check src/ tests/
      - name: mypy --strict
        run: uv run mypy src/pkplugin

  # ---------------------------------------------------------------------------
  # Unit + golden tests across Python 3.11 / 3.12 / 3.13
  # ---------------------------------------------------------------------------
  test:
    name: test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.10.6"
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Install project + test deps
        run: |
          uv venv --python ${{ matrix.python-version }}
          uv pip install -e ".[dev,mcp,plot,report,cdisc,compliance]"
      - name: Run pytest
        run: uv run pytest -q --tb=short

  # ---------------------------------------------------------------------------
  # Build distribution + verify
  # ---------------------------------------------------------------------------
  build:
    name: build (sdist + wheel)
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.10.6"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Build sdist + wheel
        run: |
          uv venv --python 3.12
          uv pip install build
          uv run python -m build
      - name: Verify build outputs
        run: |
          ls -la dist/
          test -f dist/*.whl
          test -f dist/*.tar.gz
      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v7
        with:
          name: pk-copilot-dist
          path: dist/*
          retention-days: 30

  # ---------------------------------------------------------------------------
  # SBOM (CycloneDX) attached to tagged releases only
  # ---------------------------------------------------------------------------
  sbom:
    name: sbom (CycloneDX)
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - name: Install uv
        uses: astral-sh/setup-uv@v8
        with:
          version: "0.10.6"
      - name: Set up Python 3.12
        run: uv python install 3.12
      - name: Install project
        run: |
          uv venv --python 3.12
          uv pip install -e ".[dev,mcp,plot,report,cdisc,compliance]"
      - name: Generate SBOM
        run: uv run pkplugin sbom > sbom.cdx.json
      - name: Attach SBOM artifact
        uses: actions/upload-artifact@v7
        with:
          name: sbom-cyclonedx
          path: sbom.cdx.json
          retention-days: 365
